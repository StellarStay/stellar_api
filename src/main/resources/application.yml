spring:
  application:
    name: Stellar_Stay
  profiles:
    active: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

springdoc:
  swagger-ui:
    path: /
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY}
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY}
    expiration: ${JWT_EXPIRATION}

  mail:
    from: ${MAIL_FROM}
    admin: ${MAIL_ADMIN}
  otp:
    email-verify-ttl: 300
    reset-password-ttl: 180
    rate-limit: 5
  aws:
    s3:
      access-key: ${AWS_ACCESS_KEY}
      scret-key: ${AWS_SECRET_KEY}
      region: ${AWS_REGION}
      bucket: ${AWS_BUCKET}