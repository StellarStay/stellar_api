<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mã OTP xác thực email</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #eee; border-radius: 5px;">
        <h2 style="color: #0056b3; text-align: center;">Xác thực địa chỉ email</h2>
        <p>Xin chào!</p>
        <p>Mã OTP xác thực email của bạn là:</p>
        <div style="text-align: center; margin: 20px 0;">
            <span style="font-size: 24px; font-weight: bold; background-color: #f4f4f4; padding: 10px 20px; border-radius: 5px; letter-spacing: 5px;" th:text="${otp}">123456</span>
        </div>
        <p>Mã có hiệu lực trong <strong th:text="${validityTime}">5</strong> phút.</p>
        <p>Vui lòng không chia sẻ mã này với bất kỳ ai.</p>
        <p>Nếu bạn không thực hiện yêu cầu này, hãy bỏ qua email này.</p>
        <br>
        <p>Trân trọng,<br><strong>Stella Booking</strong></p>
    </div>
</body>
</html>
