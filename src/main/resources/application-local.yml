# application-local.yml
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/stellar_stay
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration 
    baseline-on-migrate: true
    baseline-version: 0


